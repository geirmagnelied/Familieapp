<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FamilieApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; background: #F2ECEE; }
:root {
  --bg:#F2ECEE; --surface:#FAF7F8; --card:#FFFFFF; --border:#E3D8DC;
  --text:#2A2025; --muted:#9B8A90; --soft:#F5EEF1;
  --pink:#D4607E; --pink-light:#FADADF; --pink-deep:#B8445F; --rose:#EAA0B0;
  --grey:#7A7078; --charcoal:#3A2E32; --mint:#6DBF99; --gold:#E8B84B;
  --radius:16px; --shadow:0 2px 12px rgba(160,80,100,0.08);
  --font-h:'Baloo 2',sans-serif; --font-b:'Nunito',sans-serif;
}
body { font-family:var(--font-b); color:var(--text); overflow:hidden; }
.app { display:flex; flex-direction:column; height:100dvh; max-width:480px; margin:0 auto; background:var(--bg); overflow:hidden; }

#splash { position:fixed; inset:0; z-index:600; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; max-width:480px; margin:0 auto; }
.splash-title { font-family:var(--font-h); font-size:28px; font-weight:800; color:var(--charcoal); }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--pink); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

#onboarding { position:fixed; inset:0; z-index:500; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; padding:40px 28px; max-width:480px; margin:0 auto; }
.ob-title { font-family:var(--font-h); font-size:26px; font-weight:800; color:var(--charcoal); text-align:center; margin-bottom:6px; }
.ob-sub { font-size:14px; color:var(--muted); text-align:center; margin-bottom:28px; font-weight:600; line-height:1.5; }
.ob-grid { display:flex; flex-direction:column; gap:9px; width:100%; }
.ob-btn { width:100%; padding:15px 18px; background:var(--card); border:2px solid var(--border); border-radius:var(--radius); font-family:var(--font-h); font-size:17px; font-weight:700; color:var(--charcoal); cursor:pointer; transition:all 0.15s; text-align:left; box-shadow:var(--shadow); }
.ob-btn.selected { border-color:var(--pink); background:var(--pink-light); color:var(--pink-deep); }
.ob-meta { font-size:12px; color:var(--muted); font-weight:600; margin-top:1px; }

#pinPad { width:100%; margin-top:20px; display:none; flex-direction:column; align-items:center; gap:14px; }
.pin-name { font-family:var(--font-h); font-size:20px; font-weight:700; color:var(--charcoal); }
.pin-dots { display:flex; gap:12px; }
.pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); background:none; transition:all 0.15s; }
.pin-dot.filled { background:var(--pink); border-color:var(--pink); }
.pin-error { font-size:13px; color:var(--pink-deep); font-weight:700; height:18px; }
.pin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:280px; }
.pin-key { padding:16px; background:var(--card); border:1px solid var(--border); border-radius:14px; font-family:var(--font-h); font-size:22px; font-weight:700; color:var(--charcoal); cursor:pointer; text-align:center; transition:all 0.12s; box-shadow:var(--shadow); }
.pin-key:active { background:var(--pink-light); border-color:var(--pink); transform:scale(0.95); }
.pin-key.del { font-size:16px; color:var(--muted); }
.btn-back { margin-top:4px; background:none; border:none; color:var(--muted); font-family:var(--font-b); font-size:14px; font-weight:700; cursor:pointer; }

.header { background:linear-gradient(135deg,#B8445F 0%,#D4607E 55%,#E8A0B0 100%); padding:44px 18px 10px; flex-shrink:0; z-index:10; box-shadow:0 2px 12px rgba(180,60,90,0.18); }
.header-inner { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.app-title { font-family:var(--font-h); font-size:19px; font-weight:800; color:#fff; }
.header-center { flex:1; text-align:center; font-size:12px; color:rgba(255,255,255,0.8); font-weight:700; }
.user-chip { background:rgba(255,255,255,0.22); border:1px solid rgba(255,255,255,0.35); color:#fff; font-size:13px; font-weight:800; padding:5px 13px; border-radius:20px; cursor:pointer; font-family:var(--font-b); }

.nav { display:flex; background:var(--card); border-top:1px solid var(--border); flex-shrink:0; z-index:10; box-shadow:0 -1px 6px rgba(0,0,0,0.05); min-height:64px; }
.nav-btn { flex:1; padding:14px 3px 12px; border:none; background:none; font-family:var(--font-b); font-size:10px; font-weight:800; color:var(--muted); cursor:pointer; text-transform:uppercase; letter-spacing:0.3px; position:relative; transition:color 0.15s; line-height:1.3; }
.nav-btn.active { color:var(--pink-deep); }
.nav-btn.active::after { content:''; position:absolute; top:0; left:20%; right:20%; height:2px; background:var(--pink-deep); border-radius:0 0 3px 3px; }

.content { flex:1; overflow-y:auto; padding:14px 14px 90px; -webkit-overflow-scrolling:touch; }

.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
.card-title { font-family:var(--font-h); font-size:16px; font-weight:700; color:var(--charcoal); margin-bottom:13px; display:flex; align-items:center; justify-content:space-between; }
.card-action { font-family:var(--font-b); font-size:13px; font-weight:700; color:var(--pink); cursor:pointer; }

.my-score-big { text-align:center; padding:6px 0 14px; }
.my-score-num { font-family:var(--font-h); font-size:68px; font-weight:800; color:var(--pink-deep); line-height:1; }
.my-score-label { font-size:13px; color:var(--muted); font-weight:700; margin-top:3px; text-transform:uppercase; letter-spacing:0.5px; }
.stat-row { display:flex; justify-content:space-around; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
.stat-box { text-align:center; }
.stat-num { font-family:var(--font-h); font-size:24px; font-weight:800; color:var(--charcoal); }
.stat-lbl { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.3px; margin-top:1px; }

.locked-box { text-align:center; padding:22px 14px; background:var(--soft); border-radius:12px; border:1px solid var(--border); }
.locked-title { font-family:var(--font-h); font-size:17px; font-weight:700; color:var(--charcoal); margin-bottom:6px; }
.locked-sub { font-size:13px; color:var(--muted); font-weight:600; line-height:1.5; }
.countdown { font-family:var(--font-h); font-size:26px; font-weight:800; color:var(--pink); margin:10px 0; }

.log-item { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); }
.log-item:last-child { border-bottom:none; }
.log-label { font-weight:600; font-size:14px; color:var(--charcoal); }
.log-time { font-size:11px; color:var(--muted); margin-top:1px; font-weight:600; }
.log-pts { font-family:var(--font-h); font-size:16px; font-weight:800; color:var(--pink); }

/* Chores */
.chore-item { display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--border); }
.chore-item:last-child { border-bottom:none; }
.chore-info { flex:1; min-width:0; }
.chore-label { font-weight:700; font-size:14px; color:var(--charcoal); }
.chore-meta { font-size:12px; color:var(--muted); margin-top:2px; font-weight:600; }
.chore-right { display:flex; flex-direction:column; gap:5px; align-items:flex-end; flex-shrink:0; }
.btn-log { background:var(--pink); color:#fff; border:none; border-radius:10px; font-family:var(--font-b); font-weight:800; font-size:13px; padding:9px 16px; cursor:pointer; transition:all 0.15s; }
.btn-log:active { transform:scale(0.96); }
.btn-log.done { background:var(--soft); color:var(--mint); border:2px solid var(--mint); }
.min-input { width:58px; background:var(--soft); border:1px solid var(--border); color:var(--text); border-radius:9px; font-family:var(--font-b); font-size:14px; font-weight:700; padding:7px 8px; text-align:center; }
.min-input:focus { outline:none; border-color:var(--pink); }
.pts-preview { font-size:11px; color:var(--pink-deep); font-weight:800; text-align:right; }

/* Recurring task badge */
.recurring-badge { display:inline-flex; align-items:center; font-size:10px; font-weight:800; padding:2px 8px; border-radius:20px; background:rgba(232,184,75,0.15); color:#9A6A00; border:1px solid rgba(232,184,75,0.35); margin-top:3px; }

/* Tasks */
.task-item { display:flex; gap:12px; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--border); }
.task-item:last-child { border-bottom:none; }
.task-check { width:22px; height:22px; border-radius:7px; border:2px solid var(--border); background:none; cursor:pointer; flex-shrink:0; transition:all 0.18s; margin-top:2px; display:flex; align-items:center; justify-content:center; font-size:12px; }
.task-check.checked { background:var(--mint); border-color:var(--mint); color:#fff; }
.task-body { flex:1; }
.task-title { font-weight:700; font-size:14px; color:var(--charcoal); }
.task-title.done { text-decoration:line-through; color:var(--muted); }
.task-meta { margin-top:4px; display:flex; gap:5px; flex-wrap:wrap; }
.pill { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }
.pill-pink { background:var(--pink-light); color:var(--pink-deep); }
.pill-grey { background:var(--soft); color:var(--grey); border:1px solid var(--border); }
.pill-gold { background:rgba(232,184,75,0.15); color:#9A6A00; border:1px solid rgba(232,184,75,0.3); }

/* Shopping */
.shop-item { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); }
.shop-item:last-child { border-bottom:none; }
.shop-check { width:22px; height:22px; border-radius:50%; border:2px solid var(--border); background:none; cursor:pointer; flex-shrink:0; transition:all 0.18s; display:flex; align-items:center; justify-content:center; font-size:12px; }
.shop-check.checked { background:var(--pink); border-color:var(--pink); color:#fff; }
.shop-label { flex:1; font-size:14px; font-weight:600; color:var(--charcoal); }
.shop-label.done { text-decoration:line-through; color:var(--muted); }
.shop-qty { font-size:12px; color:var(--muted); font-weight:700; }
.prog-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.prog-bg { flex:1; height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--pink-light),var(--pink)); border-radius:4px; transition:width 0.4s; }
.prog-text { font-size:12px; font-weight:800; color:var(--muted); white-space:nowrap; }
.add-row { display:flex; gap:8px; margin-top:10px; }
.add-input { flex:1; background:var(--soft); border:1.5px solid var(--border); color:var(--text); border-radius:10px; font-family:var(--font-b); font-size:14px; padding:9px 12px; }
.add-input:focus { outline:none; border-color:var(--pink); }
.btn-sm { background:var(--pink); color:#fff; border:none; border-radius:10px; font-family:var(--font-b); font-weight:800; font-size:18px; width:40px; cursor:pointer; }

/* Admin */
.admin-note { font-size:13px; color:var(--muted); font-weight:600; margin-bottom:12px; padding:10px 12px; background:var(--soft); border-radius:10px; line-height:1.5; }
.admin-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.admin-row:last-of-type { border-bottom:none; }
.admin-name { flex:1; font-weight:700; font-size:14px; color:var(--charcoal); }
.admin-meta { font-size:12px; color:var(--muted); font-weight:600; text-align:right; }
.btn-del { background:none; border:1px solid var(--border); color:var(--muted); border-radius:8px; font-size:12px; font-weight:800; padding:4px 10px; cursor:pointer; font-family:var(--font-b); flex-shrink:0; }
.btn-del:active { background:var(--pink-light); color:var(--pink-deep); border-color:var(--pink); }

.admin-section-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); margin:16px 0 8px; }

.fab { position:fixed; bottom:76px; right:18px; width:52px; height:52px; background:var(--pink-deep); border:none; border-radius:50%; font-size:26px; color:#fff; cursor:pointer; box-shadow:0 4px 16px rgba(180,60,90,0.35); display:none; align-items:center; justify-content:center; z-index:50; }
.fab:active { transform:scale(0.93); }

.backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.38); backdrop-filter:blur(3px); z-index:200; display:flex; align-items:flex-end; justify-content:center; animation:bdin 0.18s; }
@keyframes bdin { from{opacity:0} to{opacity:1} }
.sheet { background:var(--card); border-radius:22px 22px 0 0; width:100%; max-width:480px; padding:16px 18px 38px; max-height:90vh; overflow-y:auto; animation:sheetup 0.25s cubic-bezier(0.32,0.72,0,1); }
@keyframes sheetup { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle { width:34px; height:3px; background:var(--border); border-radius:3px; margin:0 auto 14px; }
.sheet-title { font-family:var(--font-h); font-size:18px; font-weight:700; color:var(--charcoal); margin-bottom:14px; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.field input,.field select,.field textarea { width:100%; background:var(--soft); border:1.5px solid var(--border); color:var(--text); border-radius:11px; font-family:var(--font-b); font-size:15px; padding:11px 13px; }
.field input:focus,.field select:focus,.field textarea:focus { outline:none; border-color:var(--pink); }
.field textarea { resize:none; height:72px; }
.field-row { display:flex; gap:10px; }
.field-row .field { flex:1; }
.type-row { display:flex; gap:6px; flex-wrap:wrap; }
.type-chip { padding:6px 13px; border-radius:20px; font-size:12px; font-weight:700; border:2px solid var(--border); cursor:pointer; font-family:var(--font-b); background:var(--soft); color:var(--muted); transition:all 0.15s; }
.type-chip.active { background:var(--pink-light); color:var(--pink-deep); border-color:var(--pink); }
.btn-save { width:100%; background:var(--pink-deep); color:#fff; border:none; border-radius:12px; font-family:var(--font-h); font-size:17px; font-weight:800; padding:15px; cursor:pointer; margin-top:6px; }
.btn-save:active { transform:scale(0.98); }
.btn-cancel-s { width:100%; background:none; border:1.5px solid var(--border); color:var(--muted); border-radius:12px; font-family:var(--font-b); font-size:14px; font-weight:700; padding:12px; cursor:pointer; margin-top:8px; }
.hint { font-size:12px; color:var(--muted); font-weight:600; line-height:1.5; margin-bottom:12px; }

#fridayShow { position:fixed; inset:0; z-index:400; background:#1A0A10; display:none; flex-direction:column; align-items:center; padding:60px 22px 40px; overflow-y:auto; max-width:480px; margin:0 auto; }
#fridayShow.visible { display:flex; }
.show-title { font-family:var(--font-h); font-size:26px; font-weight:800; color:#fff; text-align:center; margin-bottom:4px; opacity:0; animation:fadein 0.8s 0.3s forwards; }
.show-sub { font-size:13px; color:rgba(255,255,255,0.45); text-align:center; margin-bottom:36px; font-weight:600; opacity:0; animation:fadein 0.8s 0.6s forwards; }
@keyframes fadein { to{opacity:1} }
.show-bars { width:100%; display:flex; flex-direction:column; gap:16px; }
.show-bar-row { opacity:0; }
.show-bar-row.revealed { animation:slidein 0.55s cubic-bezier(.2,.8,.3,1) forwards; }
@keyframes slidein { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:none} }
.show-bar-name { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.show-name { font-family:var(--font-h); font-size:17px; font-weight:700; color:#fff; }
.show-pts { font-family:var(--font-h); font-size:20px; font-weight:800; color:var(--rose); }
.show-bar-bg { height:16px; background:rgba(255,255,255,0.07); border-radius:8px; overflow:hidden; }
.show-bar-fill { height:100%; border-radius:8px; background:linear-gradient(90deg,var(--pink-deep),var(--rose)); width:0%; transition:width 1.1s cubic-bezier(.4,0,.2,1); }
.winner-reveal { margin-top:44px; text-align:center; width:100%; opacity:0; }
.winner-reveal.show { animation:pulsein 0.85s 0.2s cubic-bezier(.2,.8,.3,1) forwards; }
@keyframes pulsein { 0%{opacity:0;transform:scale(0.75)} 70%{transform:scale(1.05)} 100%{opacity:1;transform:scale(1)} }
.winner-label { font-size:12px; color:rgba(255,255,255,0.45); font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.winner-name-big { font-family:var(--font-h); font-size:38px; font-weight:800; color:#fff; }
.winner-pts-big { display:inline-block; margin-top:8px; background:var(--pink); color:#fff; font-family:var(--font-h); font-size:18px; font-weight:800; padding:7px 22px; border-radius:22px; }
.honor-box { margin-top:24px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:13px; padding:14px 18px; width:100%; text-align:left; }
.honor-title { font-size:11px; color:rgba(255,255,255,0.38); font-weight:800; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
.honor-row { font-size:14px; color:rgba(255,255,255,0.75); font-weight:600; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
.honor-row:last-child { border-bottom:none; }
.btn-close-show { margin-top:32px; padding:14px 36px; background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.18); color:#fff; border-radius:var(--radius); font-family:var(--font-b); font-size:15px; font-weight:800; cursor:pointer; }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--pink-deep); color:#fff; font-family:var(--font-b); font-weight:800; font-size:14px; padding:10px 22px; border-radius:22px; z-index:300; white-space:nowrap; box-shadow:0 4px 16px rgba(180,60,90,0.32); animation:toastpop 2.8s forwards; }
@keyframes toastpop { 0%{opacity:0;transform:translateX(-50%) translateY(-12px) scale(0.92)} 12%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)} 78%{opacity:1} 100%{opacity:0} }
.empty { text-align:center; padding:40px 16px; color:var(--muted); }
.empty p { font-size:14px; font-weight:600; line-height:1.6; }
.realtime-dot { width:7px; height:7px; border-radius:50%; background:var(--mint); display:inline-block; margin-right:5px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Chat ── */
.chat-wrap { display:flex; flex-direction:column; height:100%; }
.chat-messages { flex:1; overflow-y:auto; padding:4px 2px 8px; display:flex; flex-direction:column; gap:8px; }
.chat-day-divider { text-align:center; font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin:14px 0 6px; }
.chat-bubble-row { display:flex; flex-direction:column; max-width:78%; }
.chat-bubble-row.mine { align-self:flex-end; align-items:flex-end; }
.chat-bubble-row.theirs { align-self:flex-start; align-items:flex-start; }
.chat-sender { font-size:11px; font-weight:800; color:var(--muted); margin-bottom:2px; padding:0 4px; }
.chat-bubble { padding:10px 14px; border-radius:18px; font-size:14px; font-weight:600; line-height:1.4; word-break:break-word; }
.chat-bubble-row.mine .chat-bubble { background:var(--pink-deep); color:#fff; border-bottom-right-radius:5px; }
.chat-bubble-row.theirs .chat-bubble { background:var(--card); color:var(--charcoal); border:1px solid var(--border); border-bottom-left-radius:5px; }
.chat-time { font-size:10px; color:var(--muted); font-weight:600; margin-top:2px; padding:0 4px; }
.chat-input-row { display:flex; gap:8px; padding:10px 0 0; flex-shrink:0; }
.chat-input { flex:1; background:var(--soft); border:1.5px solid var(--border); color:var(--text); border-radius:22px; font-family:var(--font-b); font-size:15px; padding:11px 16px; }
.chat-input:focus { outline:none; border-color:var(--pink); }
.chat-send { background:var(--pink-deep); color:#fff; border:none; border-radius:50%; width:44px; height:44px; font-size:18px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.chat-send:active { transform:scale(0.93); }
.chat-empty { text-align:center; padding:40px 16px; color:var(--muted); font-size:14px; font-weight:600; }

/* ── Date picker for past-day logging ── */
.date-bar { display:flex; align-items:center; gap:8px; margin-bottom:14px; }

/* ── Check if a recurring task falls in the current week ── */
function isThisWeek(task, refDate) {
  const now = refDate || new Date();
  // Start/end of current week (Monday–Sunday)
  const dayOfWeek = now.getDay() || 7; // 1=Mon, 7=Sun
  const monday = new Date(now); monday.setDate(now.getDate() - dayOfWeek + 1); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59,999);

  const type = task.recurrence_type;

  if (type === 'once') {
    if (!task.once_date) return false;
    const d = new Date(task.once_date);
    return d >= monday && d <= sunday;
  }

  if (type === 'yearly') {
    // Check if the yearly date (month/day) falls within this week
    const m = task.month - 1; // 0-indexed
    const day = task.day_of_month;
    // This year
    const thisYear = new Date(now.getFullYear(), m, day);
    if (thisYear >= monday && thisYear <= sunday) return true;
    // Next year edge case (week crossing year boundary)
    const nextYear = new Date(now.getFullYear()+1, m, day);
    return nextYear >= monday && nextYear <= sunday;
  }

  if (type === 'monthly') {
    // Same day each month — check if that day is in this week
    const day = task.day_of_month;
    // Current month
    const thisMonth = new Date(now.getFullYear(), now.getMonth(), day);
    if (thisMonth >= monday && thisMonth <= sunday) return true;
    // Next month
    const nextMonth = new Date(now.getFullYear(), now.getMonth()+1, day);
    return nextMonth >= monday && nextMonth <= sunday;
  }

  if (type === 'interval_months') {
    if (!task.start_date || !task.interval_n) return false;
    const start = new Date(task.start_date);
    // Find the closest occurrence on or after start
    let cur = new Date(start);
    while (cur <= sunday) {
      if (cur >= monday && cur <= sunday) return true;
      cur.setMonth(cur.getMonth() + task.interval_n);
    }
    return false;
  }

  if (type === 'interval_weeks') {
    if (!task.start_date || !task.interval_n) return false;
    const start = new Date(task.start_date);
    let cur = new Date(start);
    while (cur <= sunday) {
      if (cur >= monday && cur <= sunday) return true;
      cur.setDate(cur.getDate() + task.interval_n * 7);
    }
    return false;
  }

  if (type === 'weekly') {
    // day_of_week: 1=Mon…7=Sun (ISO)
    const iso = task.day_of_week; // stored as 1-7
    const target = new Date(monday);
    target.setDate(monday.getDate() + (iso - 1));
    return target >= monday && target <= sunday;
  }

  return false;
}

function recurrenceLabel(task) {
  const t = task.recurrence_type;
  const MONTH_NAMES = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  if (t==='yearly') return `Kvart år ${task.day_of_month}. ${MONTH_NAMES[task.month-1]}`;
  if (t==='monthly') return `Kvar månad ${task.day_of_month}.`;
  if (t==='interval_months') return `Kvar ${task.interval_n}. månad`;
  if (t==='interval_weeks') return `Kvar ${task.interval_n}. veke`;
  if (t==='weekly') { const WD=['','man','tys','ons','tor','fre','lau','søn']; return `Kvar ${WD[task.day_of_week]}`; }
  if (t==='once' && task.once_date) return `Eingong: ${task.once_date}`;
  return t;
}

/* ── STATS / GRAF ── */
let statsPeriod = 'w8'; // w4, w8, w12, m6, m12

function statsPeriodConfig(p){
  if (p==='w4')  return {unit:'week',  count:4};
  if (p==='w8')  return {unit:'week',  count:8};
  if (p==='w12') return {unit:'week',  count:12};
  if (p==='m6')  return {unit:'month', count:6};
  if (p==='m12') return {unit:'month', count:12};
  return {unit:'week', count:8};
}

function setStatsPeriod(p){ statsPeriod=p; renderTab('stats'); }

async function renderStats(){
  const cfg = statsPeriodConfig(statsPeriod);
  const now = new Date();
  const currentWk = weekKey(now);
  const fridayUnlocked = isFridayReveal();

  // Build list of period buckets (oldest to newest)
  const buckets = []; // {key, label, isCurrentAndLocked}
  if (cfg.unit==='week') {
    for (let i=cfg.count-1; i>=0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i*7);
      const key = weekKey(d);
      const locked = (key===currentWk) && !fridayUnlocked;
      buckets.push({ key, label:'V'+weekNum(d), locked });
    }
  } else {
    for (let i=cfg.count-1; i>=0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const key = monthKey(d);
      const isCurrentMonth = (key===monthKey(now));
      const locked = isCurrentMonth && !fridayUnlocked;
      const MN=['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
      buckets.push({ key, label:MN[d.getMonth()], locked });
    }
  }

  // Fetch all logs once
  const logs = await sb('chore_logs?select=user_id,pts,created_at');

  // Aggregate per member per bucket
  const series = members.map(m => {
    const values = buckets.map(b => {
      if (b.locked) return null; // hidden
      const sum = logs.filter(l => l.user_id===m.id && (cfg.unit==='week' ? weekKey(new Date(l.created_at))===b.key : monthKey(new Date(l.created_at))===b.key)).reduce((a,l)=>a+l.pts,0);
      return sum;
    });
    return { member:m, values };
  });

  const maxVal = Math.max(1, ...series.flatMap(s=>s.values.filter(v=>v!==null)));

  const periodButtons = [
    {v:'w4',l:'4 v'},{v:'w8',l:'8 v'},{v:'w12',l:'12 v'},{v:'m6',l:'6 mnd'},{v:'m12',l:'12 mnd'}
  ].map(p=>`<button class="stats-period-btn ${statsPeriod===p.v?'active':''}" onclick="setStatsPeriod('${p.v}')">${p.l}</button>`).join('');

  const svg = buildLineChartSVG(buckets, series, maxVal);

  const totals = members.map(m=>{
    const total = buckets.reduce((sum,b,i)=>{
      const v = series.find(s=>s.member.id===m.id)?.values[i];
      return sum + (v||0);
    },0);
    return {member:m, total};

function buildLineChartSVG(buckets, series, maxVal){
  const W = Math.max(320, buckets.length*56);
  const H = 220;
  const padL = 36, padR = 14, padT = 14, padB = 28;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const n = buckets.length;
  const xStep = n>1 ? plotW/(n-1) : 0;

  const xFor = i => padL + i*xStep;
  const yFor = v => padT + plotH - (v/maxVal)*plotH;

  // Grid lines (horizontal, 4 lines)
  let gridHtml = '';
  for (let g=0; g<=4; g++){
    const gy = padT + plotH - (g/4)*plotH;
    const val = Math.round((g/4)*maxVal);
    gridHtml += `<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="var(--border)" stroke-width="1"/>`;
    gridHtml += `<text x="${padL-6}" y="${gy+3}" font-size="9" fill="var(--muted)" text-anchor="end" font-family="Nunito">${val}</text>`;
  }

  // X labels
  let labelHtml = '';
  buckets.forEach((b,i)=>{
    labelHtml += `<text x="${xFor(i)}" y="${H-8}" font-size="10" fill="var(--muted)" text-anchor="middle" font-family="Nunito" font-weight="700">${b.label}</text>`;
  });

  // Lines per member — skip null (locked) points by breaking the path
  let linesHtml = '';
  series.forEach(s => {
    const color = memberColor(s.member.id);
    let pathSegs = [];
    let current = [];
    s.values.forEach((v,i) => {
      if (v===null) {
        if (current.length) { pathSegs.push(current); current=[]; }
      } else {
        current.push([xFor(i), yFor(v)]);
      }
    });
    if (current.length) pathSegs.push(current);

    pathSegs.forEach(seg => {
      const d = seg.map((pt,idx)=> (idx===0?'M':'L') + pt[0].toFixed(1) + ',' + pt[1].toFixed(1)).join(' ');
      linesHtml += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
      seg.forEach(pt => {
        linesHtml += `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3.5" fill="${color}"/>`;
      });
    });
  });

  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">
    ${gridHtml}
    ${linesHtml}
    ${labelHtml}
  </svg>`;
}

function updateCountdown(){
  const el=document.getElementById('countdown');if(!el)return;
  const now=new Date();const d=now.getDay();
  const fri=new Date(now);fri.setDate(now.getDate()+(d<=5?5-d:6));fri.setHours(18,0,0,0);
  const diff=fri-now;if(diff<=0){el.textContent='No!';return;}
  const h=Math.floor(diff/3600000);const m=Math.floor((diff%3600000)/60000);
  el.textContent=h>24?`${Math.floor(h/24)}d ${h%24}t`:`${h}t ${m}m`;
  setTimeout(updateCountdown,30000);
}

function shiftLogDate(deltaDays){
  const d = new Date(selectedLogDate);
  d.setDate(d.getDate()+deltaDays);
  const todayD = new Date(dateStr());
  if (d > todayD) return;
  selectedLogDate = dateStr(d);

function logDateLabel(){
  const d = new Date(selectedLogDate);
  const today = dateStr();
  const yesterday = dateStr(new Date(Date.now()-86400000));
  if (selectedLogDate===today) return 'I dag';
  if (selectedLogDate===yesterday) return 'I går';
  return d.toLocaleDateString('no',{weekday:'short',day:'numeric',month:'short'});
}

async function renderChores(){
  const isToday = selectedLogDate === dateStr();

  const dayLogs=await sb(`chore_logs?user_id=eq.${currentUser.id}&created_at=gte.${selectedLogDate}T00:00:00&created_at=lt.${selectedLogDate}T23:59:59&select=chore_id`);

  const allRec=await sb('recurring_tasks?active=eq.true&select=*&order=created_at');
  const selectedDateObj = new Date(selectedLogDate+'T12:00:00');
  const dueThisWeek=allRec.filter(t=>isThisWeek(t,selectedDateObj));

  const wk=weekKey(selectedDateObj);
  const weekLogs=await sb(`chore_logs?user_id=eq.${currentUser.id}&select=chore_id,created_at`);
  const loggedThisWeekIds=new Set(

  const bonus=currentUser.mult>1?`<p style="font-size:13px;color:var(--pink-deep);font-weight:700;margin-bottom:12px;padding:9px 12px;background:var(--pink-light);border-radius:9px;">${currentUser.name} får ${currentUser.mult}× poeng for alt!</p>`:'';

    </div>`;

  const regularHtml=chores.map(c=>{
    const done=c.type==='daily'&&dayIds.has(c.id);
    const effPts=c.pts*currentUser.mult;
    return `<div class="chore-item">

        <button class="btn-log ${done?'done':''}" onclick="${done?'':c.type==='per5'?`logPer5('${c.id}','${c.label}',${c.pts})`:`logChore('${c.id}','${c.label}',${c.pts})`}">
          ${done?'Gjort':c.type==='per5'?'Logg':'Registrer'}
        </button>
      </div>
    </div>`;
  }).join('');

  const recurringHtml = dueThisWeek.length ? `
    <div style="margin-top:18px; border-top:1px solid var(--border); padding-top:14px;">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-bottom:10px;">Denne veka</div>
      ${dueThisWeek.map(t=>{
        const done=loggedThisWeekIds.has(t.id);
        const effPts=t.pts*currentUser.mult;
        const assignedTo=t.assigned_to?members.find(m=>m.id===t.assigned_to):null;
        const isForMe=!t.assigned_to||t.assigned_to===currentUser.id;
        return `<div class="chore-item" style="${!isForMe?'opacity:0.5':''}">

              ${done?'Gjort':isForMe?'Registrer':'—'}

  return `<div class="card">

      <div id="recurringFields"></div>
      <button class="btn-save" onclick="saveRecurring()">Legg til</button>
      <button class="btn-cancel-s" onclick="closeModal()">Avbryt</button>
    </div>
  </div>`;
  updateRecurringFields();
}

function updateRecurringFields(){
  const type=document.getElementById('rRt')?.value;
  const el=document.getElementById('recurringFields');
  if(!el)return;
  const MONTH_NAMES=['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
  const WD_NAMES=['Måndag','Tysdag','Onsdag','Torsdag','Fredag','Laurdag','Sundag'];
  if(type==='yearly') el.innerHTML=`
    <div class="field-row">
      <div class="field"><label>Månad</label><select id="rMo">${MONTH_NAMES.map((n,i)=>`<option value="${i+1}">${n}</option>`).join('')}</select></div>
      <div class="field"><label>Dag i månaden</label><input type="number" id="rDom" value="1" min="1" max="31"></div>
    </div>`;
  else if(type==='monthly') el.innerHTML=`
    <div class="field"><label>Dag i månaden</label><input type="number" id="rDom" value="1" min="1" max="31" placeholder="t.d. 15"></div>`;
  else if(type==='interval_months') el.innerHTML=`
    <div class="field-row">
      <div class="field"><label>Kvar N. månad</label><input type="number" id="rN" value="3" min="1"></div>
      <div class="field"><label>Startdato</label><input type="date" id="rSd" value="${dateStr()}"></div>
    </div>`;
  else if(type==='interval_weeks') el.innerHTML=`
    <div class="field-row">
      <div class="field"><label>Kvar N. veke</label><input type="number" id="rN" value="4" min="1"></div>
      <div class="field"><label>Startdato</label><input type="date" id="rSd" value="${dateStr()}"></div>
    </div>`;
  else if(type==='weekly') el.innerHTML=`
    <div class="field"><label>Kva dag</label><select id="rDow">${WD_NAMES.map((n,i)=>`<option value="${i+1}">${n}</option>`).join('')}</select></div>`;
  else if(type==='once') el.innerHTML=`
    <div class="field"><label>Dato</label><input type="date" id="rOd" value="${dateStr()}"></div>`;
  else el.innerHTML='';
}

async function saveRecurring(){
  const title=document.getElementById('rT')?.value.trim();if(!title){toast('Skriv inn tittel');return;}
  const pts=Number(document.getElementById('rP')?.value||10);
  const type=document.getElementById('rRt')?.value;
  const assigned_to=document.getElementById('rA')?.value||null;
  const body={title,pts,recurrence_type:type,assigned_to:assigned_to||null,active:true};
  if(type==='yearly'){ body.month=Number(document.getElementById('rMo')?.value); body.day_of_month=Number(document.getElementById('rDom')?.value); }
  if(type==='monthly'){ body.day_of_month=Number(document.getElementById('rDom')?.value); }
  if(type==='interval_months'||type==='interval_weeks'){ body.interval_n=Number(document.getElementById('rN')?.value); body.start_date=document.getElementById('rSd')?.value; }
  if(type==='weekly'){ body.day_of_week=Number(document.getElementById('rDow')?.value); }
  if(type==='once'){ body.once_date=document.getElementById('rOd')?.value; }
  await sb('recurring_tasks',{method:'POST',headers:HR,body:JSON.stringify(body)});
  closeModal();toast('Oppgåve lagt til!');renderTab('admin');
}

function showTaskModal(){
  document.getElementById('modal').innerHTML=`
  <div class="backdrop" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Ny oppgåve</div>
      <div class="field"><label>Tittel</label><input id="mT" placeholder="Kva skal gjerast?"></div>
      <div class="field"><label>Type</label>
        <div class="type-row">
          ${TASK_TYPES.map(t=>`<button class="type-chip ${t.v==='once'?'active':''}" onclick="selType(this,'${t.v}')">${t.l}</button>`).join('')}
          <input type="hidden" id="mTy" value="once">
        </div>
      </div>
      <div class="field"><label>Tildel til</label>
        <select id="mAs"><option value="">Felles (alle)</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select>
      </div>
      <div class="field" id="mDF"><label>Frist</label><input type="date" id="mDu"></div>
      <div class="field"><label>Poeng</label><input type="number" id="mPt" value="10" min="0"></div>
      <button class="btn-save" onclick="saveTask()">Lagre</button>
      <button class="btn-cancel-s" onclick="closeModal()">Avbryt</button>
    </div>
  </div>`;
}
function selType(btn,val){
  btn.closest('.type-row').querySelectorAll('.type-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');document.getElementById('mTy').value=val;
  const df=document.getElementById('mDF');if(df)df.style.display=val==='once'?'block':'none';
}
async function saveTask(){
  const title=document.getElementById('mT')?.value.trim();if(!title){toast('Skriv inn tittel');return;}
  await sb('tasks',{method:'POST',headers:HR,body:JSON.stringify({
    title,type:document.getElementById('mTy')?.value||'once',
    assigned_to:document.getElementById('mAs')?.value||null,
    due_date:document.getElementById('mDu')?.value||null,
    pts:Number(document.getElementById('mPt')?.value||0),done:false
  })});
  closeModal();toast('Oppgåve lagt til');renderTab('tasks');
}

function showShopModal(){
  document.getElementById('modal').innerHTML=`
  <div class="backdrop" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Ny handleliste</div>
      <div class="field"><label>Namn</label><input id="sT" placeholder="t.d. Vekehandel"></div>
      <div class="field"><label>Varer (éi per linje)</label><textarea id="sI" placeholder="Mjølk&#10;Brød&#10;Egg"></textarea></div>
      <button class="btn-save" onclick="saveShop()">Opprett</button>
      <button class="btn-cancel-s" onclick="closeModal()">Avbryt</button>
    </div>
  </div>`;
}
async function saveShop(){
  const title=document.getElementById('sT')?.value.trim();if(!title){toast('Skriv inn namn');return;}
  const list=await sb('shopping_lists',{method:'POST',headers:HR,body:JSON.stringify({title})});
  const listId=list[0].id;
  const raw=document.getElementById('sI')?.value||'';
  const items=raw.split('\n').map(s=>s.trim()).filter(Boolean).map((n,i)=>({list_id:listId,name:n,qty:'',done:false,sort_order:i}));
  if(items.length)await sb('shopping_items',{method:'POST',headers:HR,body:JSON.stringify(items)});
  closeModal();toast('Handleliste oppretta');renderTab('shopping');
}

/* ── CHAT ── */
let chatPollTimer = null;
let lastChatRenderCount = 0;

async function renderChat(){
  const msgs = await sb('messages?select=*&order=created_at.asc&limit=200');
  lastChatRenderCount = msgs.length;
  return `
  <div class="chat-wrap" style="height:calc(100dvh - 230px)">
    <div class="chat-messages" id="chatMessages">
      ${renderChatMessages(msgs)}
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Skriv ei melding…" onkeydown="if(event.key==='Enter')sendChatMessage()">
      <button class="chat-send" onclick="sendChatMessage()">➤</button>
    </div>
  </div>`;
}

function renderChatMessages(msgs){
  if (!msgs.length) return `<div class="chat-empty">Ingen meldingar enno.<br>Send den første!</div>`;
  let html = '';
  let lastDay = '';
  msgs.forEach(m => {
    const d = new Date(m.created_at);
    const dayKey = d.toLocaleDateString('no', {weekday:'long', day:'numeric', month:'long'});
    if (dayKey !== lastDay) {
      html += `<div class="chat-day-divider">${dayKey}</div>`;
      lastDay = dayKey;
    }
    const sender = members.find(mem => mem.id === m.user_id);
    const mine = m.user_id === currentUser.id;
    const time = d.toLocaleTimeString('no', {hour:'2-digit', minute:'2-digit'});
    html += `
      <div class="chat-bubble-row ${mine?'mine':'theirs'}">
        ${!mine ? `<div class="chat-sender">${sender?sender.name:'?'}</div>` : ''}
        <div class="chat-bubble">${escapeHtml(m.text)}</div>
        <div class="chat-time">${time}</div>
      </div>`;
  });
  return html;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function scrollChatToBottom(){
  setTimeout(() => {
    const el = document.getElementById('chatMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 60);
}

async function sendChatMessage(){
  const inp = document.getElementById('chatInput');
  const text = inp?.value.trim();
  if (!text) return;
  inp.value = '';
  try {
    await sb('messages', {method:'POST', headers:HR, body:JSON.stringify({user_id:currentUser.id, text})});
  } catch(e) {
    toast('Kunne ikkje sende melding');
    return;
  }
  if (currentTab === 'chat') {
    const msgs = await sb('messages?select=*&order=created_at.asc&limit=200');
    lastChatRenderCount = msgs.length;
    const el = document.getElementById('chatMessages');
    if (el) { el.innerHTML = renderChatMessages(msgs); scrollChatToBottom(); }
  }
}

/* Poll for new chat messages every 3s while chat tab is open */
function setupChatRealtime(){
  teardownChatRealtime();
  chatPollTimer = setInterval(async () => {
    if (currentTab !== 'chat') return;
    try {
      const msgs = await sb('messages?select=*&order=created_at.asc&limit=200');
      if (msgs.length !== lastChatRenderCount) {
        lastChatRenderCount = msgs.length;
        const el = document.getElementById('chatMessages');
        if (el) {
          const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
          el.innerHTML = renderChatMessages(msgs);
          if (wasAtBottom) scrollChatToBottom();
        }
      }
    } catch(e) { /* silent fail on poll */ }
  }, 3000);
}
function teardownChatRealtime(){
  if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
}

function closeModal(){document.getElementById('modal').innerHTML='';}

let _tt;
function toast(msg){
  clearTimeout(_tt);
  document.getElementById('toastEl').innerHTML=`<div class="toast">${msg}</div>`;
  _tt=setTimeout(()=>{document.getElementById('toastEl').innerHTML='';},2900);
}

init();
</script>
